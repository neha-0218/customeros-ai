{% extends 'base.html' %}
{% block title %}New Feature Request — CustomerOS AI{% endblock %}
{% block page_title %}Submit Feature Request{% endblock %}

{% block content %}
<div style="max-width: 600px;">
    <div class="card">
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary">Submit</button>
                <a href="{% url 'feature_list' %}" class="btn btn-outline-secondary ms-2">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
