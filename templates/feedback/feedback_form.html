{% extends 'base.html' %}

{% block title %}Log Feedback — CustomerOS AI{% endblock %}
{% block page_title %}Log New Feedback{% endblock %}

{% block content %}
<div style="max-width: 600px;">
    <div class="card">
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary">Save Feedback</button>
                <a href="{% url 'feedback_list' %}" class="btn btn-outline-secondary ms-2">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
