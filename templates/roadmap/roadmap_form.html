{% extends 'base.html' %}
{% block title %}New Roadmap Item — CustomerOS AI{% endblock %}
{% block page_title %}Add Roadmap Item{% endblock %}

{% block content %}
<div style="max-width: 600px;">
    <div class="card">
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary mt-2">Save</button>
                <a href="{% url 'roadmap_list' %}" class="btn btn-outline-secondary ms-2 mt-2">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
